name: CI/CD — Guardy Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. BUILD & TEST
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # 2. DEPLOY
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Copy files to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: 'dist/,package.json,package-lock.json,ecosystem.config.js'
          target: '/var/www/guardy'
          rm: false

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e
            cd /var/www/guardy

            echo "=== Installing production dependencies ==="
            npm ci --omit=dev

            echo "=== Ensuring DB tables exist ==="
            docker exec tavba_postgres psql -U postgres -d guardy_db -c "
              GRANT ALL ON SCHEMA public TO guardy_user;
              CREATE TABLE IF NOT EXISTS users (id SERIAL PRIMARY KEY, \"telegramId\" BIGINT UNIQUE NOT NULL, username VARCHAR(64), \"firstName\" VARCHAR(255) NOT NULL, \"lastName\" VARCHAR(255), \"createdAt\" TIMESTAMPTZ NOT NULL DEFAULT now(), \"updatedAt\" TIMESTAMPTZ NOT NULL DEFAULT now());
              CREATE TABLE IF NOT EXISTS groups (id SERIAL PRIMARY KEY, \"telegramId\" BIGINT UNIQUE NOT NULL, title VARCHAR(255) NOT NULL, username VARCHAR(255), type VARCHAR NOT NULL DEFAULT 'supergroup', \"isActive\" BOOLEAN NOT NULL DEFAULT true, \"createdAt\" TIMESTAMPTZ NOT NULL DEFAULT now(), \"updatedAt\" TIMESTAMPTZ NOT NULL DEFAULT now());
              CREATE TABLE IF NOT EXISTS group_admins (id SERIAL PRIMARY KEY, \"groupId\" INTEGER NOT NULL REFERENCES groups(id) ON DELETE CASCADE, \"userId\" INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, \"telegramUserId\" BIGINT NOT NULL, \"isOwner\" BOOLEAN NOT NULL DEFAULT false, \"canDeleteMessages\" BOOLEAN NOT NULL DEFAULT false, \"canRestrictMembers\" BOOLEAN NOT NULL DEFAULT false, \"canManageChat\" BOOLEAN NOT NULL DEFAULT false, \"canPromoteMembers\" BOOLEAN NOT NULL DEFAULT false, \"cachedAt\" TIMESTAMPTZ NOT NULL DEFAULT now());
              CREATE TABLE IF NOT EXISTS group_settings (id SERIAL PRIMARY KEY, \"groupId\" INTEGER UNIQUE NOT NULL REFERENCES groups(id) ON DELETE CASCADE, \"muteEnabled\" BOOLEAN NOT NULL DEFAULT true, \"deleteEnabled\" BOOLEAN NOT NULL DEFAULT true, \"welcomeEnabled\" BOOLEAN NOT NULL DEFAULT true, \"antiSpamEnabled\" BOOLEAN NOT NULL DEFAULT false, \"antiFloodEnabled\" BOOLEAN NOT NULL DEFAULT false, extra JSONB NOT NULL DEFAULT '{}', \"createdAt\" TIMESTAMPTZ NOT NULL DEFAULT now(), \"updatedAt\" TIMESTAMPTZ NOT NULL DEFAULT now());
              CREATE TABLE IF NOT EXISTS messages (id SERIAL PRIMARY KEY, \"telegramMessageId\" BIGINT NOT NULL, \"groupId\" INTEGER NOT NULL REFERENCES groups(id) ON DELETE CASCADE, \"userId\" INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, \"telegramUserId\" BIGINT NOT NULL, text VARCHAR(4096), \"telegramUsername\" VARCHAR(255), \"sentAt\" TIMESTAMPTZ NOT NULL, \"createdAt\" TIMESTAMPTZ NOT NULL DEFAULT now());
              CREATE INDEX IF NOT EXISTS idx_messages_group_sent ON messages (\"groupId\", \"sentAt\");
              CREATE INDEX IF NOT EXISTS idx_messages_group_user_sent ON messages (\"groupId\", \"userId\", \"sentAt\");
              GRANT ALL ON ALL TABLES IN SCHEMA public TO guardy_user;
              GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO guardy_user;
            " 2>&1 | grep -v 'already exists' || true

            echo "=== Restarting with PM2 ==="
            if pm2 list | grep -q "guardy"; then
              pm2 reload ecosystem.config.js --env production
            else
              pm2 start ecosystem.config.js --env production
            fi

            pm2 save
            pm2 startup systemd -u root --hp /root || true

            echo "=== Deploy complete ==="
            pm2 status
